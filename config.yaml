paths:
  slides_csv: "data/slides.csv"
  out_dir: "artifacts"
  log_dir: "tb_logs"

preprocess:
  thumbnail_plot: true
  find_tissues: true
  tile_size_px: 128
  tiles_key: "tiles"
  feature_model: "HOptimus0"
  amp: true
  force_no_amp_on_mps: true
  overwrite: false

bags:
  max_instances: 6000
  save_format: "pt"
  store_slide_feats: true
  store_coords: true
  store_attention_mask: true

train:
  seed: 42
  batch_size: 4
  num_workers: 4
  max_epochs: 10
  lr: 1e-4
  weight_decay: 1e-4
  accelerator: "auto"
  devices: "auto"

model:
  name: "abmil"
  in_dim: "auto"
  embed_dim: 512
  attn_dim: 384
  num_fc_layers: 1
  dropout: 0.25
  gate: true
  num_classes: 2

splits:
  train_ids: "data/train_ids.txt"
  val_ids: "data/val_ids.txt"
